<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智慧扫描 - H5文档扫描仪</title>
  <script src="https://raw.githubusercontent.com/cnqm/cnqm.github.io/refs/heads/main/opencv.js" onload="onOpenCvReady();"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #000;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .header {
      height: 44px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 16px;
      font-weight: 500;
      position: relative;
    }
    .header .btn-close {
      position: absolute;
      left: 16px;
      background: none;
      border: none;
      color: #fff;
      font-size: 14px;
    }
    .preview-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #videoPreview {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .scan-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .scan-frame {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80%;
      height: 60%;
      border: 2px solid transparent;
      border-radius: 4px;
      box-shadow: 0 0 0 100vmax rgba(0, 0, 0, 0.5);
      transition: border-color 0.3s ease;
    }
    .scan-frame.active {
      border-color: #ff8c00;
    }
    .scan-corner {
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: #ff8c00;
      border-style: solid;
    }
    .corner-tl {
      top: -2px;
      left: -2px;
      border-width: 2px 0 0 2px;
    }
    .corner-tr {
      top: -2px;
      right: -2px;
      border-width: 2px 2px 0 0;
    }
    .corner-bl {
      bottom: -2px;
      left: -2px;
      border-width: 0 0 2px 2px;
    }
    .corner-br {
      bottom: -2px;
      right: -2px;
      border-width: 0 2px 2px 0;
    }
    .scan-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
          background: linear-gradient(to bottom, rgba(255, 140, 0, 0.8), rgba(255, 140, 0, 0.2));
      animation: scan 2s linear infinite;
      display: none;
    }
    .scan-frame.active + .scan-line {
      display: block;
    }
    @keyframes scan {
      0% { top: 0; opacity: 0.8; }
      50% { opacity: 1; }
      100% { top: 100%; opacity: 0.8; }
    }
    .footer {
      height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 16px 0;
    }
    .btn-row {
      display: flex;
      gap: 40px;
    }
    .btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid #fff;
      background: transparent;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-capture {
      background: #fff;
      color: #000;
    }
    .btn-icon {
      font-size: 24px;
    }
    .tips {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
    }
    #status {
      position: absolute;
      top: 10px;
      left: 0;
      width: 100%;
      text-align: center;
      color: #ff8c00;
      font-size: 14px;
    }
    #resultCanvas {
      display: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <button class="btn-close">取消</button>
      <span>文档扫描</span>
    </div>
    <div class="preview-container">
      <video id="videoPreview" autoplay playsinline></video>
      <div class="scan-overlay">
        <div class="scan-frame" id="scanFrame">
          <div class="scan-corner corner-tl"></div>
          <div class="scan-corner corner-tr"></div>
          <div class="scan-corner corner-bl"></div>
          <div class="scan-corner corner-br"></div>
        </div>
        <div class="scan-line"></div>
      </div>
      <div id="status">正在检测文档边缘...</div>
    </div>
    <div class="footer">
      <div class="btn-row">
        <button class="btn" id="btnAlbum">📁</button>
        <button class="btn btn-capture" id="btnCapture">📸</button>
        <button class="btn" id="btnFlash">⚡</button>
      </div>
      <div class="tips">将文档放入框内，系统将自动识别边框</div>
    </div>
  </div>
  <canvas id="sourceCanvas"></canvas>
  <canvas id="resultCanvas"></canvas>

  <script>
    let cvReady = false;
    let stream = null;
    let detectionInterval = null;
    let isFlashOn = false;

    const video = document.getElementById('videoPreview');
    const sourceCanvas = document.getElementById('sourceCanvas');
    const resultCanvas = document.getElementById('resultCanvas');
    const ctx = sourceCanvas.getContext('2d');
    const scanFrame = document.getElementById('scanFrame');
    const statusText = document.getElementById('status');

    // OpenCV 就绪回调
    function onOpenCvReady() {
      cvReady = true;
      console.log('OpenCV.js 已加载');
      initCamera();
    }

    // 初始化摄像头
    async function initCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: 'environment',
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          }
        });
        video.srcObject = stream;
        statusText.textContent = '摄像头已开启，请对准文档';
        startEdgeDetection();
      } catch (err) {
        console.error('无法访问摄像头:', err);
        statusText.textContent = '摄像头权限被拒绝或设备不支持';
      }
    }

    // 开始边缘检测（带防抖）
    function startEdgeDetection() {
      clearInterval(detectionInterval);
      detectionInterval = setInterval(() => {
        if (cvReady && video.readyState === video.HAVE_ENOUGH_DATA) {
          autoDetectBorder();
        }
      }, 800); // 800ms检测一次，平衡性能与响应速度
    }

    // 核心：自动吸附边框
    function autoDetectBorder() {
      sourceCanvas.width = video.videoWidth;
      sourceCanvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, sourceCanvas.width, sourceCanvas.height);

      let src = cv.imread(sourceCanvas);
      let gray = new cv.Mat();
      let edges = new cv.Mat();
      let hierarchy = new cv.Mat();

      cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
      cv.GaussianBlur(gray, gray, new cv.Size(5, 5), 0);
      cv.Canny(gray, edges, 50, 150, 3, false);

      let contours = new cv.MatVector();
      cv.findContours(edges, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

      let maxArea = 0;
      let maxContour = null;
      for (let i = 0; i < contours.size(); ++i) {
        let area = cv.contourArea(contours.get(i));
        if (area > maxArea && area > sourceCanvas.width * sourceCanvas.height * 0.05) {
          maxArea = area;
          maxContour = contours.get(i);
        }
      }

      if (maxContour) {
        let rect = cv.boundingRect(maxContour);
        let aspectRatio = rect.width / rect.height;
        if (aspectRatio > 0.5 && aspectRatio < 2.0) { // 过滤掉过于狭长的矩形
          scanFrame.classList.add('active');
          statusText.textContent = '文档边框已锁定';
        } else {
          scanFrame.classList.remove('active');
          statusText.textContent = '未检测到有效文档';
        }
      } else {
        scanFrame.classList.remove('active');
        statusText.textContent = '请将文档置于光线充足处';
      }

      src.delete(); gray.delete(); edges.delete();
      contours.delete(); hierarchy.delete();
    }

    // 拍照并处理
    document.getElementById('btnCapture').addEventListener('click', function() {
      if (!scanFrame.classList.contains('active')) {
        alert('请先确保文档边框被正确识别');
        return;
      }
      statusText.textContent = '正在处理图像...';
      captureAndProcess();
    });

    function captureAndProcess() {
      let src = cv.imread(sourceCanvas);
      let gray = new cv.Mat();
      cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
      cv.GaussianBlur(gray, gray, new cv.Size(5, 5), 0);

      let contours = new cv.MatVector();
      let hierarchy = new cv.Mat();
      cv.findContours(gray, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

      let maxArea = 0;
      let maxContour = null;
      for (let i = 0; i < contours.size(); ++i) {
        let area = cv.contourArea(contours.get(i));
        if (area > maxArea) {
          maxArea = area;
          maxContour = contours.get(i);
        }
      }

      if (maxContour) {
        let rect = cv.boundingRect(maxContour);
        let dst = new cv.Mat();
        let dsize = new cv.Size(rect.width, rect.height);
        cv.resize(src.roi(rect), dst, dsize, 0, 0, cv.INTER_LINEAR);
        cv.imshow(resultCanvas, dst);
        downloadImage(resultCanvas.toDataURL('image/jpeg'));
        dst.delete();
      }
      src.delete(); gray.delete(); contours.delete(); hierarchy.delete();
      statusText.textContent = '文档已保存';
    }

    function downloadImage(dataUrl) {
      const a = document.createElement('a');
      a.href = dataUrl;
      a.download = '智慧扫描_' + new Date().getTime() + '.jpg';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    // 关闭应用
    document.querySelector('.btn-close').addEventListener('click', function() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
      }
      clearInterval(detectionInterval);
      window.close();
    });

    // 切换闪光灯（模拟）
    document.getElementById('btnFlash').addEventListener('click', function() {
      isFlashOn = !isFlashOn;
      this.style.background = isFlashOn ? '#ff8c00' : 'transparent';
      this.style.color = isFlashOn ? '#000' : '#fff';
    });
  </script>
</body>
</html>
